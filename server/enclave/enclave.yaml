# Enclave configuration
# Edit this file then run: enclave init

name: bitspend-server                     # App name (used in stack name, EIF name)
version: 0.0.1                   # Build version (semver, baked into binary via ldflags)
region: us-east-1                # AWS region
account: "043673801220"                      # AWS account ID (required)
prefix: dev                      # Deployment prefix (stack = {prefix}Nitro{Name})
instance_type: m6i.xlarge        # EC2 instance type
migration_cooldown: "1m"         # Cooldown before migration proceeds
previous_pcr0: "a04d771a80eba8e3dc56322a09826a023b6a92761a4b0170947ef196b2485c31599598105e049992a8a8124a825eb7ca"

# SDK coordinates for the enclave supervisor binary.
# The supervisor handles attestation, secrets, PCR extension, and signing
# middleware automatically. Your app is a plain HTTP server with zero SDK imports.
sdk:
  rev: "v0.0.68"
  hash: "sha256-/5YoFEHiKJ01XrzGTTlco+EXZzYFTlsLq2cD5DuaMd4="
  vendor_hash: "sha256-txUyJGwLZWTMfYZXhruNnEKhC13LKqu1XsT6xlhzJxs="

app:
  language: "rust"               # App language: go, nodejs, dotnet, rust
  source: nix                    # "nix" = fetch from GitHub via Nix

  # GitHub coordinates for the app to run inside the enclave.
  # Your app is a plain HTTP server that listens on ENCLAVE_APP_PORT (default 7074).
  # Secrets are passed as environment variables. No SDK imports needed.
  nix_owner: "BitspendPayment"                  # GitHub owner (required)
  nix_repo: "MPCWallet"                   # GitHub repo name (required)
  nix_rev: "c9e68c4326ff7f1385dd9ffbfb55c4e9b3fb68ba"                    # Git commit SHA (required)
  nix_hash: "sha256-JkKVV1n35Ed6bcEl2Nt9lV4dh5ZKq/VthSmn/lyHEcQ="                   # Nix source hash: nix-prefetch-url --unpack (required)
  nix_vendor_hash: "sha256-QPBa326MlMDIxvxC4Zp8PMgW9hi31pdH0MRwv8+j7uc="            # Go vendor hash (required)
  nix_sub_packages:              # Go sub-packages to build
    - "."
  nix_subdir: "server"                 # Subdirectory for monorepo (e.g. "server")
  binary_name: ""                # Output binary name (defaults to 'name')

  # Extra nixpkgs attrs added to the build sandbox.
  nix_build_inputs: ["openssl"]
  nix_native_build_inputs: ["pkg-config", "protobuf"]

  # Environment variables baked into the EIF.
  # Template vars: {{region}}, {{prefix}}, {{version}}
  env:
      PORT: "7074"
      COSIGNER_WASM_PATH: "https://github.com/BitspendPayment/MPCWallet/releases/download/cosigner-8c631a813dff4f34080b83631ce10ebdc8829d26/cosigner.wasm"
      BITCOIN_NETWORK: "signet"
      ELECTRUM_URL: "electrum.mutinynet.com"
      ELECTRUM_PORT: "50001"
      ASP_URL: "https://mutinynet.arkade.sh"
      PERSISTENCE_BACKEND: "enclave"
      SUPERVISOR_URL: "http://127.0.0.1:7073"


# Secrets managed by KMS inside the enclave.
# Each secret is generated as 32 random bytes, encrypted with KMS,
# stored in SSM, and decrypted at boot via attestation.
# The decrypted value (hex-encoded) is set as the specified env var.
secrets:
  - name: signing_key
    env_var: APP_SIGNING_KEY
  # - name: api_token
  #   env_var: APP_API_TOKEN
