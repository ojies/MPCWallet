name: Build Cosigner WASM

on:
  push:
    branches: [main]
    paths:
      - 'cosigner/**'
      - 'threshold/**'
      - 'ark/**'
  pull_request:
    paths:
      - 'cosigner/**'
      - 'threshold/**'
      - 'ark/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install cargo-component
        run: cargo install cargo-component

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cosigner/target
          key: cosigner-${{ hashFiles('cosigner/Cargo.lock', 'threshold/Cargo.toml', 'ark/Cargo.toml') }}

      - name: Build cosigner WASM
        run: cd cosigner && cargo component build --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: cosigner-wasm
          path: cosigner/target/wasm32-wasip1/release/cosigner.wasm
          retention-days: 90

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: cosigner-wasm

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cosigner-${{ github.sha }}
          name: "Cosigner WASM (${{ github.sha }})"
          files: cosigner.wasm
          generate_release_notes: true
