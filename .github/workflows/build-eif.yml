name: Build EIF

on:
  push:
    branches: [master, main]
    paths:
      - 'server/enclave/**'
      - 'server/flake.nix'
      - 'server/flake.lock'
      - 'server/src/**'
      - 'server/Cargo.toml'
      - 'server/Cargo.lock'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-eif:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install enclave CLI
        run: go install github.com/ArkLabsHQ/introspector-enclave/cmd/enclave@latest

      - name: Pull Nix Docker image
        run: docker pull nixos/nix:2.24.9

      - name: Build EIF
        working-directory: server
        run: enclave build

      - name: Extract PCR values
        id: pcr
        run: |
          PCR0=$(jq -r '.PCR0 // .pcr0' server/enclave/artifacts/pcr.json)
          echo "pcr0=${PCR0}" >> "$GITHUB_OUTPUT"
          echo "PCR0: ${PCR0:0:32}..."

      - name: Upload EIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: enclave-eif
          path: |
            server/enclave/artifacts/image.eif
            server/enclave/artifacts/pcr.json
            server/enclave/artifacts/enclave-mgmt
            server/enclave/artifacts/gvproxy
          retention-days: 7

      - name: Upload to latest release
        env:
          GH_TOKEN: ${{ github.token }}
          PCR0: ${{ steps.pcr.outputs.pcr0 }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          TAG="eif-latest"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --title "EIF (latest)" \
            --notes "Auto-built EIF from commit ${COMMIT_SHA::8}
          PCR0: ${PCR0}" \
            --prerelease \
            server/enclave/artifacts/image.eif \
            server/enclave/artifacts/pcr.json \
            server/enclave/artifacts/enclave-mgmt \
            server/enclave/artifacts/gvproxy

      - name: Publish deployment manifest
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          PCR0=$(jq -r '.PCR0 // .pcr0' server/enclave/artifacts/pcr.json)
          PCR1=$(jq -r '.PCR1 // .pcr1' server/enclave/artifacts/pcr.json)
          PCR2=$(jq -r '.PCR2 // .pcr2' server/enclave/artifacts/pcr.json)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          TAG="build-$(date -u +%Y%m%d-%H%M%S)"

          jq -n \
            --arg pcr0 "$PCR0" \
            --arg pcr1 "$PCR1" \
            --arg pcr2 "$PCR2" \
            --arg timestamp "$TIMESTAMP" \
            --arg commit "$COMMIT_SHA" \
            --arg repo "$REPO" \
            '{pcr0: $pcr0, pcr1: $pcr1, pcr2: $pcr2, timestamp: $timestamp, commit: $commit, repo: $repo}' \
            > deployment.json

          # Create a timestamped build release with the manifest.
          gh release create "$TAG" deployment.json \
            --title "Build ${TAG}" \
            --notes "Build manifest from commit ${COMMIT_SHA::8}
          **PCR0:** ${PCR0}"

          # Update the eif-latest release with the deployment manifest too.
          gh release upload eif-latest deployment.json --clobber
