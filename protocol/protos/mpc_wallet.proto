syntax = "proto3";

package mpc_wallet;

service MPCWallet {
  // DKG
  rpc DKGStep1 (DKGStep1Request) returns (DKGStep1Response);
  rpc DKGStep2 (DKGStep2Request) returns (DKGStep2Response);
  rpc DKGStep3 (DKGStep3Request) returns (DKGStep3Response);

  // Signing
  rpc SignStep1 (SignStep1Request) returns (SignStep1Response);
  rpc SignStep2 (SignStep2Request) returns (SignStep2Response);

  // Refresh
  rpc RefreshStep1 (RefreshStep1Request) returns (RefreshStep1Response);
  rpc RefreshStep2 (RefreshStep2Request) returns (RefreshStep2Response);
  rpc RefreshStep3 (RefreshStep3Request) returns (RefreshStep3Response);

  // Policy
  rpc CreateSpendingPolicy (CreateSpendingPolicyRequest) returns (CreateSpendingPolicyResponse);
  rpc GetPolicyId (GetPolicyIdRequest) returns (GetPolicyIdResponse);
  rpc UpdatePolicy (UpdatePolicyRequest) returns (UpdatePolicyResponse);
  rpc DeletePolicy (DeletePolicyRequest) returns (DeletePolicyResponse);

  // Broadcast
  rpc BroadcastTransaction (BroadcastTransactionRequest) returns (BroadcastTransactionResponse);

  // Sync / History
  rpc FetchHistory (FetchHistoryRequest) returns (FetchHistoryResponse);
  rpc FetchRecentTransactions (FetchRecentTransactionsRequest) returns (FetchRecentTransactionsResponse);
  rpc SubscribeToHistory (SubscribeToHistoryRequest) returns (stream TransactionNotification);

  // Ark Protocol
  rpc GetArkInfo (GetArkInfoRequest) returns (GetArkInfoResponse);
  rpc GetArkAddress (GetArkAddressRequest) returns (GetArkAddressResponse);
  rpc GetBoardingAddress (GetBoardingAddressRequest) returns (GetBoardingAddressResponse);
  rpc ListVtxos (ListVtxosRequest) returns (ListVtxosResponse);
  rpc SendVtxo (SendVtxoRequest) returns (SendVtxoResponse);
  rpc RedeemVtxo (RedeemVtxoRequest) returns (RedeemVtxoResponse);

  // Ark Settle (boarding): board on-chain UTXOs into Ark VTXOs.
  // Stateful: call multiple times to drive the batch protocol.
  // Phase 1: call with no signed_messages → returns SIGNING_REQUIRED + intent sighashes
  // Phase 2: call with FROST signatures → registers intent, waits for batch
  // Phase 3: poll → returns SIGNING_REQUIRED for commitment/forfeit, or SETTLED
  rpc Settle (SettleRequest) returns (SettleResponse);

  // Ark SettleDelegate: settle existing VTXOs using the delegate pattern.
  // Only 2 rounds (vs 4 for boarding):
  // Phase 1: call with no signed_messages → returns SIGNING_REQUIRED + all sighashes
  // Phase 2: call with FROST signatures → server drives batch autonomously → SETTLED
  rpc SettleDelegate (SettleDelegateRequest) returns (SettleDelegateResponse);
}

// DKG Messages

message DKGStep1Request {
  bytes user_id = 1;
  bytes identifier = 2;
  string round1_package = 3; // JSON
  bool is_restore = 4; // If true, server reuses stored DKG secret instead of generating new one
}

message DKGStep1Response {
  map<string, string> round1_packages = 1; 
}

message DKGStep2Request {
  bytes user_id = 1;
  bytes identifier = 2;
  string round1_package = 3; // JSON
}

message DKGStep2Response {
   map<string, string> all_round1_packages = 1;
}

message DKGStep3Request {
   bytes user_id = 1;
    bytes identifier = 2;
   map<string, string> round2_packages_for_others = 3;
}

message DKGStep3Response {
    map<string, string> round2_packages_for_me = 1;
}

// Signing Messages

message SignStep1Request {
  bytes user_id = 1;
  bytes hiding_commitment = 2;
  bytes binding_commitment = 3;
  bytes message_to_sign = 4;
  bytes signature = 5; // Schnorr signature over auth message for authentication
  bytes full_transaction = 6;
  int64 timestamp_ms = 7; // Unix timestamp in milliseconds for replay protection
  bool script_path_spend = 8; // If true, skip taproot tweak (script-path signing)
}


message SignStep1Response {
   message Commitment {
       bytes hiding = 1;
       bytes binding = 2;
   }
   map<string, Commitment> commitments = 1;
   bytes message_to_sign = 2; 
   int32 used_key_index = 3; // The key index the server selected for this signing session
}

message SignStep2Request {
   bytes user_id = 1;
   bytes signature_share = 3;
   bytes signature = 4; // Schnorr signature over auth message for authentication
   int64 timestamp_ms = 5; // Unix timestamp in milliseconds for replay protection
}

message UtxoInfo {
    string tx_hash = 1;
    int32 vout = 2;
    int64 amount = 3; // satoshis
}


message SignStep2Response {
   // Final aggregated signature
   // (R, z)
   bytes r_point = 1;
   bytes z_scalar = 2;
}

// Refresh Messages

message RefreshStep1Request {
  bytes user_id = 1;
  string round1_package = 3; // JSON
  int64 threshold_amount = 4;
  int64 interval = 5;
  bytes signature = 6; // Schnorr signature over auth message for authentication
  int64 timestamp_ms = 7; // Unix timestamp in milliseconds for replay protection
}

message RefreshStep1Response {
  map<string, string> round1_packages = 1;
  string policy_id = 2;
  int64 start_time = 3;
}

message RefreshStep2Request {
  bytes user_id = 1;
  // In DKG Step 2 we sent round1_package again, but strict state management
  // might not need it if session is locked. We will mirror DKG for consistency.
  string round1_package = 3;
  bytes signature = 4; // Schnorr signature over auth message for authentication
  int64 timestamp_ms = 5; // Unix timestamp in milliseconds for replay protection
}

message RefreshStep2Response {
   map<string, string> all_round1_packages = 1;
}

message RefreshStep3Request {
   bytes user_id = 1;
   map<string, string> round2_packages_for_others = 3;
   bytes signature = 4; // Schnorr signature over auth message for authentication
   int64 timestamp_ms = 5; // Unix timestamp in milliseconds for replay protection
}

message RefreshStep3Response {
    map<string, string> round2_packages_for_me = 1;
}

message CreateSpendingPolicyRequest {
    bytes user_id = 1;
    int64 threshold_sats = 2;
    int64 start_time = 3; // timestamp seconds
    int64 interval_seconds = 4; // duration in seconds
    bytes signature = 5; // Schnorr signature over auth message for authentication
    int64 timestamp_ms = 6; // Unix timestamp in milliseconds for replay protection
}

message CreateSpendingPolicyResponse {
    string policy_id = 1;
    int32 allocated_key_index = 2; // The index of the new key generated for this policy
}

message GetPolicyIdRequest {
    bytes user_id = 1;
    bytes tx_message = 2; // Transaction bytes
    bytes signature = 3; // Schnorr signature over auth message for authentication
    int64 timestamp_ms = 4; // Unix timestamp in milliseconds for replay protection
}

message GetPolicyIdResponse {
    string policy_id = 1;
}

message UpdatePolicyRequest {
    bytes user_id = 1;
    string policy_id = 2;
    int64 threshold_sats = 3;
    int64 interval_seconds = 4;
    bytes frost_signature_r = 5;
    bytes frost_signature_z = 6;
    int64 timestamp_ms = 7;
}

message UpdatePolicyResponse {
    bool success = 1;
}

message DeletePolicyRequest {
    bytes user_id = 1;
    string policy_id = 2;
    bytes frost_signature_r = 3;
    bytes frost_signature_z = 4;
    int64 timestamp_ms = 5;
}

message DeletePolicyResponse {
    bool success = 1;
}

message BroadcastTransactionRequest {
    bytes user_id = 1;
    string tx_hex = 2;
}

message BroadcastTransactionResponse {
    string tx_id = 1;
}


message FetchHistoryRequest {
    bytes user_id = 1;
    bytes signature = 2; // Schnorr signature over auth message for authentication
    int64 timestamp_ms = 3; // Unix timestamp in milliseconds for replay protection
}

message FetchHistoryResponse {
    repeated UtxoInfo utxos = 1; 
    // Could add list of past transaction IDs if needed for UI history
}

message FetchRecentTransactionsRequest {
    bytes user_id = 1;
    bytes signature = 2; // Schnorr signature over auth message for authentication
    int64 timestamp_ms = 3; // Unix timestamp in milliseconds for replay protection
}

message FetchRecentTransactionsResponse {
    repeated TransactionSummary transactions = 1;
}

message TransactionSummary {
    string tx_hash = 1;
    int64 amount_sats = 2; // Signed amount (+ for receive, - for sent)
    int64 timestamp = 3; // timestamp seconds
    bool is_pending = 4; // if in mempool
}

message SubscribeToHistoryRequest {
    bytes user_id = 1;
    bytes signature = 2; // Schnorr signature over auth message for authentication
    int64 timestamp_ms = 3; // Unix timestamp in milliseconds for replay protection
}

message TransactionNotification {
    string tx_hash = 1;
    int32 height = 2;
    // Using a simple notification that "something changed" or sending the full update?
    // User said "rely on server for maintaining state and updating it with latest transactions"
    // Sending the relevant UTXOs involved (newly created ones owned by wallet)
    repeated UtxoInfo added_utxos = 3;
    repeated UtxoInfo spent_utxos = 4; // Inputs that consumed our UTXOs
}

// Ark Protocol Messages

message GetArkInfoRequest {
    bytes user_id = 1;
    bytes signature = 2;
    int64 timestamp_ms = 3;
}

message GetArkInfoResponse {
    string signer_pubkey = 1;
    string forfeit_pubkey = 2;
    string network = 3;
    int64 session_duration = 4;
    int64 unilateral_exit_delay = 5;
    int64 boarding_exit_delay = 6;
    int64 vtxo_min_amount = 7;
    int64 dust = 8;
}

message GetArkAddressRequest {
    bytes user_id = 1;
    bytes signature = 2;
    int64 timestamp_ms = 3;
}

message GetArkAddressResponse {
    string ark_address = 1;
}

message GetBoardingAddressRequest {
    bytes user_id = 1;
    bytes signature = 2;
    int64 timestamp_ms = 3;
}

message GetBoardingAddressResponse {
    string boarding_address = 1;
}

message VtxoInfo {
    string txid = 1;
    uint32 vout = 2;
    uint64 amount = 3;
    int64 created_at = 4;
    int64 expires_at = 5;
    string status = 6; // "confirmed", "pending", "spent", "expired"
    bool is_preconfirmed = 7;
}

message ListVtxosRequest {
    bytes user_id = 1;
    bytes signature = 2;
    int64 timestamp_ms = 3;
}

message ListVtxosResponse {
    repeated VtxoInfo vtxos = 1;
    uint64 total_balance = 2;
}

message SendVtxoRequest {
    bytes user_id = 1;
    string recipient_ark_address = 2;
    uint64 amount = 3;
    bytes signature = 4;
    int64 timestamp_ms = 5;
    // FROST signatures for previously requested sighashes (phase 2)
    repeated bytes signed_messages = 6;
}

message SendVtxoResponse {
    enum Status {
        SIGNING_REQUIRED = 0;
        SETTLED = 1;
        ERROR = 2;
    }
    Status status = 1;
    // Sighashes that need FROST signing (when SIGNING_REQUIRED)
    repeated bytes messages_to_sign = 2;
    // Always true for send (script-path spend, no taproot tweak)
    bool script_path_spend = 3;
    // Ark txid when SETTLED
    string ark_txid = 4;
    // Error message when ERROR
    string error_message = 5;
}

message RedeemVtxoRequest {
    bytes user_id = 1;
    string on_chain_address = 2;
    uint64 amount = 3;
    bytes signature = 4;
    int64 timestamp_ms = 5;
}

message RedeemVtxoResponse {
    bool success = 1;
    string txid = 2;
}

// Settle Messages

message SettleRequest {
    bytes user_id = 1;
    bytes signature = 2;
    int64 timestamp_ms = 3;
    // FROST signatures for previously requested sighashes (phase 2+)
    repeated bytes signed_messages = 4;
}

message SettleResponse {
    enum Status {
        SIGNING_REQUIRED = 0;
        WAITING_FOR_BATCH = 1;
        SETTLED = 2;
        ERROR = 3;
    }
    Status status = 1;
    // Sighashes that need FROST signing (when SIGNING_REQUIRED)
    repeated bytes messages_to_sign = 2;
    // Whether these sighashes are script-path spends (no taproot tweak)
    bool script_path_spend = 3;
    // Commitment txid when SETTLED
    string commitment_txid = 4;
    // Error message when ERROR
    string error_message = 5;
}

// SettleDelegate Messages

message SettleDelegateRequest {
    bytes user_id = 1;
    bytes signature = 2;
    int64 timestamp_ms = 3;
    // FROST signatures for previously requested sighashes (phase 2)
    repeated bytes signed_messages = 4;
}

message SettleDelegateResponse {
    enum Status {
        SIGNING_REQUIRED = 0;
        SETTLED = 1;
        ERROR = 2;
    }
    Status status = 1;
    // Sighashes that need FROST signing (when SIGNING_REQUIRED)
    repeated bytes messages_to_sign = 2;
    // Always true for delegate (script-path spend, no taproot tweak)
    bool script_path_spend = 3;
    // Commitment txid when SETTLED
    string commitment_txid = 4;
    // Error message when ERROR
    string error_message = 5;
}

