[target.thumbv8m.main-none-eabihf]
runner = "probe-rs run --chip RP2350"
rustflags = [
    "-C", "link-arg=--nmagic",
    "-C", "link-arg=-Tlink.x",
    "-C", "link-arg=-Tdefmt.x",
    "-C", "target-cpu=cortex-m33",

    # Use GNU linker for CMSE veneer generation
    "-C", "linker=arm-none-eabi-ld",
    "-C", "link-arg=--allow-multiple-definition",
    "-C", "link-arg=--cmse-implib",
    "-C", "link-arg=--out-implib=target/veneers.o",
]

[build]
target = "thumbv8m.main-none-eabihf"

[env]
DEFMT_LOG = "debug"
